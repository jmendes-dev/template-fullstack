name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint (Biome)
        run: bunx biome check --reporter=github .

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test with coverage
        run: bun test --coverage
